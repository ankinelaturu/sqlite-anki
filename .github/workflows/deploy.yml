name: Deploy explorer (Vercel)

# Builds the wasm from source in CI (Vercel's build image can't — no Rust /
# Emscripten / wabt), then deploys the prebuilt explorer to Vercel. This is the
# alternative to committing the ~14 MB wasm into git.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — a Vercel access token
#   VERCEL_ORG_ID      — from `vercel link` (.vercel/project.json) or the dashboard
#   VERCEL_PROJECT_ID  — same source
#
# Also set `git.deploymentEnabled.main: false` in vercel.json so Vercel's own
# git integration doesn't try (and fail) to build on push — this workflow owns
# the deploy.

on:
  push:
    branches: [main]
    # Skip the build+deploy when a push touches only docs (the explorer is
    # unaffected). A run is still triggerable manually via workflow_dispatch.
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-explorer
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Fast Rust unit tests (pure logic — no wasm, no model). Gates the deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Rust unit tests
        run: cargo test -p anki-core

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Rust toolchain (+ wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      # Speeds up the Tract compile (the slow part) across runs.
      - uses: Swatinem/rust-cache@v2

      - name: Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14

      - name: wabt (provides wasm-strip)
        run: sudo apt-get update && sudo apt-get install -y wabt

      # Cache the vendored SQLite checkout + generated sqlite3.c (build-wasm.sh
      # clones + configures it; this avoids redoing that every run).
      - name: Cache vendored SQLite
        uses: actions/cache@v4
        with:
          path: vendor/sqlite
          key: sqlite-${{ hashFiles('scripts/build-wasm.sh') }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build wasm (default tract-onnx-st)
        run: pnpm build:wasm

      # End-to-end tests against the wasm just built: load it under Node with the
      # real model and exercise the virtual table. Runs before deploying, so a
      # failure here blocks the deploy. The 86 MB model is cached (it's pinned).
      - name: Cache model (all-MiniLM-L6-v2)
        uses: actions/cache@v4
        with:
          path: models/all-MiniLM-L6-v2/model.onnx
          key: model-all-minilm-l6-v2-onnx-v1
      - name: Download model
        run: bash scripts/download-model.sh
      - name: e2e tests (node --test against built wasm)
        run: pnpm --filter @sqlite-anki/wasm test

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Vercel pull (project settings + env)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Runs vercel.json buildCommand (pnpm --filter explorer build). The wasm
      # artifacts from the step above are already in packages/wasm/dist.
      - name: Vercel build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Vercel deploy (prebuilt)
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
